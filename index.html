<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Self-Care">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Self-Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --bg-card: rgba(255,255,255,0.06);
  --bg-card-hover: rgba(255,255,255,0.1);
  --text: #e8e4df;
  --text-dim: rgba(232,228,223,0.5);
  --text-faint: rgba(232,228,223,0.25);
  --accent: #c9a87c;
  --accent-dim: rgba(201,168,124,0.3);
  --done: #6bba7b;
  --done-bg: rgba(107,186,123,0.12);
  --dismiss-bg: rgba(255,255,255,0.04);
  --radius: 16px;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

html, body { 
  height: 100%; 
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* Screens */
.screen { 
  display: none; 
  height: 100%; 
  overflow-y: auto; 
  -webkit-overflow-scrolling: touch;
  padding: calc(var(--safe-top) + 16px) 20px calc(var(--safe-bottom) + 80px);
}
.screen.active { display: flex; flex-direction: column; }

/* ---- TRACKER SCREEN ---- */
#tracker { gap: 20px; }

.period-label {
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-align: center;
  padding-top: 8px;
}

.prompt-area {
  text-align: center;
  padding: 12px 8px;
}
.prompt-text {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 300;
  font-style: italic;
  line-height: 1.45;
  color: var(--accent);
  opacity: 0;
  transition: opacity 0.6s ease;
}
.prompt-text.visible { opacity: 1; }

.habits-list { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
}

.habit-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  background: var(--bg-card);
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-user-select: none;
  user-select: none;
}
.habit-row:active { transform: scale(0.97); }
.habit-row.done { background: var(--done-bg); }

.habit-check {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.3s ease;
}
.habit-row.done .habit-check {
  border-color: var(--done);
  background: var(--done);
}
.habit-check svg { 
  width: 14px; height: 14px; 
  stroke: var(--bg); 
  stroke-width: 3;
  opacity: 0; 
  transform: scale(0.5);
  transition: all 0.25s ease;
}
.habit-row.done .habit-check svg { opacity: 1; transform: scale(1); }

.habit-name {
  font-size: 16px;
  color: var(--text);
  transition: opacity 0.3s;
}
.habit-row.done .habit-name { opacity: 0.5; }

.action-bar {
  display: flex;
  gap: 10px;
  padding-bottom: 4px;
}
.btn {
  flex: 1;
  padding: 16px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  -webkit-user-select: none;
}
.btn:active { transform: scale(0.96); }
.btn-snooze {
  background: var(--bg-card);
  color: var(--text-dim);
}
.btn-snooze:disabled { opacity: 0.3; cursor: default; }
.btn-dismiss {
  background: var(--dismiss-bg);
  color: var(--text-dim);
  border: 1px solid var(--text-faint);
}
.btn-done-all {
  background: var(--done);
  color: var(--bg);
  font-weight: 500;
}

/* Dismiss reasons overlay */
.dismiss-reasons {
  display: none;
  flex-direction: column;
  gap: 8px;
  padding: 4px 0;
}
.dismiss-reasons.active { display: flex; }
.dismiss-reasons .reason-btn {
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--text-faint);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 14px;
  cursor: pointer;
  transition: background 0.15s;
}
.dismiss-reasons .reason-btn:active { background: var(--bg-card-hover); }
.dismiss-reasons .cancel-btn {
  padding: 10px;
  background: none;
  border: none;
  color: var(--text-faint);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  text-decoration: underline;
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 40px 20px;
}
.empty-state h2 {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 300;
  color: var(--text);
}
.empty-state p {
  font-size: 14px;
  color: var(--text-dim);
  max-width: 260px;
  line-height: 1.6;
}
.empty-state .btn-setup {
  margin-top: 8px;
  padding: 14px 32px;
  background: var(--accent-dim);
  color: var(--accent);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

/* Completion celebration */
.celebration {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  animation: fadeUp 0.5s ease;
}
.celebration.active { display: flex; }
.celebration h2 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 300;
}
.celebration p { color: var(--text-dim); font-size: 14px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mode override toggle */
.mode-toggle {
  display: flex;
  gap: 6px;
  justify-content: center;
  padding: 4px 0;
}
.mode-btn {
  padding: 6px 16px;
  background: none;
  border: 1px solid var(--text-faint);
  border-radius: 20px;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

/* ---- SETUP SCREEN ---- */
#setup { gap: 20px; }

.setup-header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 300;
}
.setup-header p {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
}

.setup-form {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.setup-form input[type="text"],
.setup-form input[type="time"] {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--text-faint);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}
.setup-form input:focus { border-color: var(--accent); }

.setup-form .row { display: flex; gap: 10px; }
.setup-form .row > * { flex: 1; }

.period-toggle {
  display: flex;
  gap: 8px;
}
.period-toggle button {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--text-faint);
  border-radius: 12px;
  background: none;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.period-toggle button.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.snooze-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.snooze-row label { font-size: 13px; color: var(--text-dim); }
.snooze-row input[type="number"] {
  width: 56px;
  padding: 8px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--text-faint);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  outline: none;
}

.btn-add {
  padding: 14px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

.setup-list { display: flex; flex-direction: column; gap: 8px; }
.setup-list-label {
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 8px 0 2px;
}

.setup-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  background: var(--bg-card);
  border-radius: var(--radius);
}
.setup-item-info .name { font-size: 15px; color: var(--text); }
.setup-item-info .meta { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
.setup-item .delete-btn {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  transition: color 0.2s;
}
.setup-item .delete-btn:active { color: #e57373; }

/* ---- NAV ---- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: rgba(26,26,46,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--text-faint);
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  padding: 14px 0 10px;
  background: none;
  border: none;
  color: var(--text-faint);
  font-family: var(--font-body);
  font-size: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* History screen */
#history { gap: 16px; }
.history-header h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 300;
}
.history-day { margin-bottom: 12px; }
.history-date {
  font-size: 13px;
  color: var(--text-dim);
  padding: 6px 0;
}
.history-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
}
.history-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.history-dot.completed { background: var(--done); }
.history-dot.missed { background: #e57373; }
.history-dot.dismissed { background: var(--text-faint); }
.history-name { font-size: 14px; color: var(--text); }
.history-meta { font-size: 12px; color: var(--text-dim); margin-left: auto; }
.history-empty { 
  color: var(--text-dim); 
  font-size: 14px; 
  text-align: center; 
  padding: 40px 20px; 
}
</style>
</head>
<body>

<!-- TRACKER -->
<div id="tracker" class="screen active">
  <div class="mode-toggle">
    <button class="mode-btn" data-mode="morning" onclick="setMode('morning')">Morning</button>
    <button class="mode-btn" data-mode="evening" onclick="setMode('evening')">Evening</button>
  </div>
  <div class="period-label" id="periodLabel"></div>
  <div class="prompt-area">
    <p class="prompt-text" id="promptText"></p>
  </div>
  <div class="habits-list" id="habitsList"></div>
  <div class="celebration" id="celebration">
    <h2>Well done.</h2>
    <p>Every small act of care counts.</p>
  </div>
  <div class="action-bar" id="actionBar">
    <button class="btn btn-snooze" id="snoozeBtn" onclick="handleSnooze()">Snooze</button>
    <button class="btn btn-dismiss" onclick="showDismissReasons()">Not now</button>
  </div>
  <div class="dismiss-reasons" id="dismissReasons">
    <button class="reason-btn" onclick="handleDismiss('tired')">Tired</button>
    <button class="reason-btn" onclick="handleDismiss('demotivated')">Demotivated</button>
    <button class="reason-btn" onclick="handleDismiss('unwell')">Unwell</button>
    <button class="reason-btn" onclick="handleDismiss('other')">Other</button>
    <button class="cancel-btn" onclick="hideDismissReasons()">Cancel</button>
  </div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <h2>No habits yet</h2>
    <p>Head to Setup to add your morning and evening habits.</p>
    <button class="btn-setup" onclick="switchScreen('setup')">Set up habits</button>
  </div>
</div>

<!-- SETUP -->
<div id="setup" class="screen">
  <div class="setup-header">
    <h1>Setup</h1>
    <p>Add 3 to 5 habits for morning and evening.</p>
  </div>
  <div class="setup-form">
    <input type="text" id="newHabitName" placeholder="Habit name, e.g. Gentle stretching">
    <div class="period-toggle">
      <button id="toggleMorning" class="selected" onclick="selectPeriod('morning')">Morning</button>
      <button id="toggleEvening" onclick="selectPeriod('evening')">Evening</button>
    </div>
    <div class="row">
      <div>
        <input type="time" id="reminderTime" value="07:00">
      </div>
      <div class="snooze-row">
        <label>Snoozes</label>
        <input type="number" id="snoozeLimit" value="3" min="0" max="10">
      </div>
    </div>
    <button class="btn-add" onclick="addHabit()">Add habit</button>
  </div>
  <div class="setup-list" id="setupList"></div>
</div>

<!-- HISTORY -->
<div id="history" class="screen">
  <div class="history-header">
    <h1>History</h1>
  </div>
  <div id="historyContent"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" data-screen="tracker" onclick="switchScreen('tracker')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Today
  </button>
  <button class="nav-btn" data-screen="setup" onclick="switchScreen('setup')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    Setup
  </button>
  <button class="nav-btn" data-screen="history" onclick="switchScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 5-6"/></svg>
    History
  </button>
</div>

<script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>
<script>
// ---- DATABASE ----
const db = new Dexie('SelfCareDB');
db.version(1).stores({
  habits: '++id, name, period',
  logs: '++id, [date+habitId], date',
  dismissals: '++id, date, period'
});

// ---- REASONS DATA ----
const REASONS = [
  "Give yourself the gift of this moment.",
  "Coming back to this habit is an act of self-love.",
  "Settle into your morning with grace.",

  "Allow yourself to simply be, without judgment.",

  "Embrace the unfolding of your day.",

  "Allow your heart to expand and soften.",
  "Be still and know that you are loved.",
  "The joy is in the presence, not the checklist.",
  "Treat your body as a sacred vessel.",
  "Slowing down is an act of rebellion against the rush.",
  "You are a sea of possibilities, just being.",
  "Offer yourself a moment of unconditional kindness.",
  "Return to the breath, return to yourself.",
  "Release the need to be productive.",
  "Softness is where the healing begins.",
  "Let the present moment wash over you.",
  "Your only job right now is to exist.",
  "Hold space for your feelings without needing to fix them.",
  "Find the centre of the storm within you.",
  "Being is the highest form of doing.",
  "Gently let go of who you think you should be.",
  "Welcome home to the present moment."
];

// ---- STATE ----
let currentMode = null; // 'morning' | 'evening'
let currentHabits = [];
let todayLogs = {};
let snoozesLeft = 3;
let setupPeriod = 'morning';

// ---- INIT ----
async function init() {
  detectMode();
  await loadTracker();
  renderSetupList();
}

function detectMode() {
  const hour = new Date().getHours();
  if (hour >= 5 && hour < 12) {
    setMode('morning');
  } else if (hour >= 17 && hour <= 23) {
    setMode('evening');
  } else {
    // Default to morning outside those windows, so the app is always usable
    setMode('morning');
  }
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  document.getElementById('periodLabel').textContent = mode;
  loadTracker();
}

async function loadTracker() {
  if (!currentMode) return;

  const allHabits = await db.habits.where('period').equals(currentMode).toArray();
  currentHabits = allHabits;

  const today = todayStr();
  const logs = await db.logs.where('date').equals(today).toArray();
  todayLogs = {};
  logs.forEach(l => { todayLogs[l.habitId] = l.completed; });

  // Reset snooze from the habit config
  if (allHabits.length > 0) {
    snoozesLeft = allHabits[0].snoozeLimit || 3;
  }

  renderTracker();
}

function renderTracker() {
  const list = document.getElementById('habitsList');
  const actionBar = document.getElementById('actionBar');
  const emptyState = document.getElementById('emptyState');
  const celebration = document.getElementById('celebration');
  const promptArea = document.querySelector('.prompt-area');
  const periodLabel = document.getElementById('periodLabel');

  // Hide dismiss reasons whenever we re-render
  hideDismissReasons();

  if (currentHabits.length === 0) {
    list.style.display = 'none';
    actionBar.style.display = 'none';
    celebration.classList.remove('active');
    promptArea.style.display = 'none';
    periodLabel.style.display = 'none';
    emptyState.style.display = 'flex';
    return;
  }

  emptyState.style.display = 'none';
  periodLabel.style.display = 'block';
  promptArea.style.display = 'block';

  // Check if all done
  const allDone = currentHabits.every(h => todayLogs[h.id]);
  if (allDone) {
    list.style.display = 'none';
    actionBar.style.display = 'none';
    celebration.classList.add('active');
    return;
  }

  celebration.classList.remove('active');
  list.style.display = 'flex';
  actionBar.style.display = 'flex';

  // Motivational prompt
  const promptEl = document.getElementById('promptText');
  promptEl.classList.remove('visible');
  const reason = REASONS[Math.floor(Math.random() * REASONS.length)];
  setTimeout(() => {
    promptEl.textContent = reason;
    promptEl.classList.add('visible');
  }, 50);

  // Snooze button
  const snoozeBtn = document.getElementById('snoozeBtn');
  snoozeBtn.textContent = `Snooze (${snoozesLeft})`;
  snoozeBtn.disabled = snoozesLeft <= 0;

  // Habits
  list.innerHTML = currentHabits.map(h => {
    const done = todayLogs[h.id] || false;
    return `
      <div class="habit-row ${done ? 'done' : ''}" onclick="toggleHabit(${h.id})">
        <div class="habit-check">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <span class="habit-name">${esc(h.name)}</span>
      </div>`;
  }).join('');
}

async function toggleHabit(id) {
  const today = todayStr();
  const current = todayLogs[id] || false;
  const newState = !current;

  // Upsert log
  const existing = await db.logs.where('[date+habitId]').equals([today, id]).first();
  if (existing) {
    await db.logs.update(existing.id, { completed: newState, timestamp: Date.now() });
  } else {
    await db.logs.add({ date: today, habitId: id, completed: newState, timestamp: Date.now() });
  }

  todayLogs[id] = newState;
  renderTracker();
}

function handleSnooze() {
  if (snoozesLeft > 0) {
    snoozesLeft--;
    const snoozeBtn = document.getElementById('snoozeBtn');
    snoozeBtn.textContent = `Snooze (${snoozesLeft})`;
    snoozeBtn.disabled = snoozesLeft <= 0;
    // Minimal feedback: just update the button. In a real notification context
    // this would schedule a re-prompt. For now it's a "come back later" action.
  }
}

function showDismissReasons() {
  document.getElementById('actionBar').style.display = 'none';
  document.getElementById('dismissReasons').classList.add('active');
}
function hideDismissReasons() {
  document.getElementById('dismissReasons').classList.remove('active');
  if (currentHabits.length > 0 && !currentHabits.every(h => todayLogs[h.id])) {
    document.getElementById('actionBar').style.display = 'flex';
  }
}

async function handleDismiss(reason) {
  await db.dismissals.add({
    date: todayStr(),
    period: currentMode,
    reason: reason,
    timestamp: Date.now()
  });
  // Mark remaining habits as not done and show celebration-like state
  hideDismissReasons();
  document.getElementById('habitsList').style.display = 'none';
  document.getElementById('actionBar').style.display = 'none';
  const cel = document.getElementById('celebration');
  cel.querySelector('h2').textContent = 'That\'s OK.';
  cel.querySelector('p').textContent = 'Be kind to yourself. Tomorrow is another day.';
  cel.classList.add('active');
}

// ---- SETUP ----
function selectPeriod(p) {
  setupPeriod = p;
  document.getElementById('toggleMorning').classList.toggle('selected', p === 'morning');
  document.getElementById('toggleEvening').classList.toggle('selected', p === 'evening');
  document.getElementById('reminderTime').value = p === 'morning' ? '07:00' : '21:00';
}

async function addHabit() {
  const name = document.getElementById('newHabitName').value.trim();
  if (!name) return;
  const time = document.getElementById('reminderTime').value;
  const snoozeLimit = parseInt(document.getElementById('snoozeLimit').value) || 3;

  await db.habits.add({
    name,
    period: setupPeriod,
    reminderTime: time,
    snoozeLimit
  });

  document.getElementById('newHabitName').value = '';
  await renderSetupList();
  await loadTracker();
}

async function deleteHabit(id) {
  await db.habits.delete(id);
  // Also clean up logs for this habit
  await db.logs.where('habitId').equals(id).delete();
  await renderSetupList();
  await loadTracker();
}

async function renderSetupList() {
  const all = await db.habits.toArray();
  const container = document.getElementById('setupList');

  const morning = all.filter(h => h.period === 'morning');
  const evening = all.filter(h => h.period === 'evening');

  let html = '';
  if (morning.length > 0) {
    html += '<div class="setup-list-label">Morning</div>';
    html += morning.map(h => setupItemHTML(h)).join('');
  }
  if (evening.length > 0) {
    html += '<div class="setup-list-label">Evening</div>';
    html += evening.map(h => setupItemHTML(h)).join('');
  }
  container.innerHTML = html;
}

function setupItemHTML(h) {
  return `
    <div class="setup-item">
      <div class="setup-item-info">
        <div class="name">${esc(h.name)}</div>
        <div class="meta">${h.reminderTime} · ${h.snoozeLimit} snoozes</div>
      </div>
      <button class="delete-btn" onclick="deleteHabit(${h.id})">×</button>
    </div>`;
}

// ---- HISTORY ----
async function loadHistory() {
  const logs = await db.logs.orderBy('date').reverse().toArray();
  const dismissals = await db.dismissals.orderBy('date').reverse().toArray();
  const habits = await db.habits.toArray();
  const habitMap = {};
  habits.forEach(h => { habitMap[h.id] = h; });

  // Group by date
  const days = {};
  logs.forEach(l => {
    if (!days[l.date]) days[l.date] = { logs: [], dismissals: [] };
    days[l.date].logs.push(l);
  });
  dismissals.forEach(d => {
    if (!days[d.date]) days[d.date] = { logs: [], dismissals: [] };
    days[d.date].dismissals.push(d);
  });

  const container = document.getElementById('historyContent');
  const dates = Object.keys(days).sort().reverse();

  if (dates.length === 0) {
    container.innerHTML = '<div class="history-empty">No history yet. Complete some habits and they\'ll show up here.</div>';
    return;
  }

  container.innerHTML = dates.slice(0, 14).map(date => {
    const day = days[date];
    let entries = day.logs.map(l => {
      const habit = habitMap[l.habitId];
      const name = habit ? habit.name : 'Deleted habit';
      const cls = l.completed ? 'completed' : 'missed';
      return `<div class="history-entry">
        <div class="history-dot ${cls}"></div>
        <span class="history-name">${esc(name)}</span>
        <span class="history-meta">${l.completed ? 'Done' : 'Skipped'}</span>
      </div>`;
    }).join('');

    if (day.dismissals.length > 0) {
      entries += day.dismissals.map(d => `
        <div class="history-entry">
          <div class="history-dot dismissed"></div>
          <span class="history-name">${d.period} dismissed</span>
          <span class="history-meta">${d.reason}</span>
        </div>`).join('');
    }

    return `<div class="history-day">
      <div class="history-date">${formatDate(date)}</div>
      ${entries}
    </div>`;
  }).join('');
}

// ---- NAVIGATION ----
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === name);
  });
  if (name === 'history') loadHistory();
  if (name === 'tracker') loadTracker();
}

// ---- UTILS ----
function todayStr() { return new Date().toISOString().split('T')[0]; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = todayStr();
  if (dateStr === today) return 'Today';
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  if (dateStr === yesterday.toISOString().split('T')[0]) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

// ---- SERVICE WORKER (minimal, for PWA install) ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ---- START ----
init();
</script>
